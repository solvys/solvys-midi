name: Bug report
description: Report a reproducible SolvysMIDI bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include file type, YouTube link shape, browser/device, and any console/API errors.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Screenshots, logs, MIDI duration, or worker response details.
