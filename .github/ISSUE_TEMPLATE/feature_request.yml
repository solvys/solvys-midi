name: Feature request
description: Suggest a product-loop or transcription improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What gets harder for a piano player today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Licensing, compute cost, mobile/PWA limits, or accuracy expectations.
