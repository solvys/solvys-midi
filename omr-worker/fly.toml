app = "solvys-midi-omr"
primary_region = "iad"

[build]
dockerfile = "Dockerfile"

[env]
MAX_UPLOAD_BYTES = "83886080"
OMR_TIMEOUT_MS = "300000"
PORT = "8080"

[http_service]
auto_start_machines = true
auto_stop_machines = "suspend"
force_https = true
internal_port = 8080
min_machines_running = 0
processes = ["app"]

[[http_service.checks]]
grace_period = "20s"
interval = "30s"
method = "GET"
path = "/health"
timeout = "5s"

[[vm]]
cpu_kind = "shared"
cpus = 2
memory = "4gb"
